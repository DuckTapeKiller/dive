name: Build desktop releases

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            os: macos-latest
            command: npx electron-builder --mac dmg --x64 --arm64 --publish never
            files: |
              release/*.dmg
              release/*.dmg.blockmap
          - platform: Windows
            os: windows-latest
            command: npx electron-builder --win nsis portable --x64 --publish never
            files: |
              release/*.exe
              release/*.exe.blockmap
              release/*.yml
          - platform: Linux
            os: ubuntu-latest
            command: npx electron-builder --linux AppImage deb --x64 --publish never
            files: |
              release/*.AppImage
              release/*.AppImage.blockmap
              release/*.deb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - run: npm ci
      - run: ${{ matrix.command }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191 # v2.2.2
        with:
          overwrite_files: true
          files: ${{ matrix.files }}
